{{define "product_detail.html"}}{{template "layout_head.html" .}}
<article class="product-detail">
  <h1>{{.Product.Name}}</h1>
  <p class="product-price">{{yen .Product.PriceYen}}</p>
  <p class="product-stock">在庫 {{.Stock}}</p>
  {{if .UserID}}
  <form method="post" action="/cart/add" class="inline-form">
    {{csrfField .CSRFToken}}
    <input type="hidden" name="product_id" value="{{.Product.ID}}">
    <input type="number" name="quantity" value="1" min="1" max="99">
    <button type="submit">カートに追加</button>
  </form>
  {{else}}
  <p><a href="/login">ログインしてカートに追加</a></p>
  {{end}}
  <p><a href="/">商品一覧へ戻る</a></p>
</article>
{{template "layout_foot.html" .}}{{end}}
