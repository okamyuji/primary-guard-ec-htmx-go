version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - bodyclose
    - gosec
    - nilerr
    - unconvert
  settings:
    gosec:
      excludes:
        - G104
        - G124
    revive:
      rules:
        - name: exported
          disabled: false
          severity: warning
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/okamyuji/primary-guard-ec-htmx-go
